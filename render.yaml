services:
  - type: web
    name: sistem-qr-kalibrasi
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn calibration_system.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render akan generate secret key baru secara otomatis
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
